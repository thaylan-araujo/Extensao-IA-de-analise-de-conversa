name: db-tests

on:
  push:
  pull_request:

jobs:
  rls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: supabase start
      - run: supabase test db

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: corepack enable pnpm
      - run: pnpm install
      - run: pnpm --filter web exec vitest run --exclude tests/skeleton.test.ts
